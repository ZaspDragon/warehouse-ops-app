<div class="section-head section-head-tight">
  <div>
    <h2>Put Away Log Capture</h2>
    <p>Upload a photo of a put away log to count entries and capture item/location data.</p>
  </div>
  <button id="uploadPutawayBtn" class="primary-btn">+ Upload Put Away Log</button>
</div>

<div class="card-grid three">
  <div class="card stat-card">
    <h3>Put Away Logs</h3>
    <div class="stat-value" id="putawayLogTotal">0</div>
    <p>Total captured entries</p>
  </div>

  <div class="card stat-card">
    <h3>Unique Locations</h3>
    <div class="stat-value" id="putawayLocationTotal">0</div>
    <p>Bins/locations captured</p>
  </div>

  <div class="card stat-card">
    <h3>Last Upload Entries</h3>
    <div class="stat-value" id="putawayLastUploadCount">0</div>
    <p>Entries found from latest image</p>
  </div>
</div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Log / Item #</th>
          <th>Location</th>
          <th>Raw Line</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="putawayTable"></tbody>
    </table>
  </div>
</div>
