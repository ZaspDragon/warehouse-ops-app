<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warehouse KPI System</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<header class="topbar">
  <h1>Warehouse KPI Control Center</h1>
</header>

<!-- ================= MAIN WRAPPER ================= -->
<div class="app-shell">

  <!-- SIDEBAR NAV -->
  <aside class="sidebar">
    <button class="nav-link active" data-view="dashboard">Dashboard</button>
    <button class="nav-link" data-view="entry">Daily Entry</button>
    <button class="nav-link" data-view="records">Records</button>
    <button class="nav-link" data-view="targets">Targets</button>
  </aside>

  <!-- ================= MAIN CONTENT ================= -->
  <main class="main-content">

    <!-- =====================================================
         DASHBOARD (DEPARTMENT TABS)
    ====================================================== -->
    <section id="dashboard" class="view active">

      <h2>Department Performance Dashboard</h2>

      <!-- DEPARTMENT TABS -->
      <div class="dept-tabs">
        <button class="dept-tab active" data-dept="all">All</button>
        <button class="dept-tab" data-dept="Receiving">Receiving</button>
        <button class="dept-tab" data-dept="Putaway">Putaway</button>
        <button class="dept-tab" data-dept="Picking">Picking</button>
        <button class="dept-tab" data-dept="Shipping">Shipping</button>
        <button class="dept-tab" data-dept="Inventory">Inventory</button>
        <button class="dept-tab" data-dept="Operations">Ops</button>
      </div>

      <!-- KPI GRID -->
      <div class="kpi-grid">

        <div class="kpi-card">
          <h3>Productivity</h3>
          <div id="kpiProductivity">0</div>
        </div>

        <div class="kpi-card">
          <h3>Accuracy</h3>
          <div id="kpiAccuracy">0%</div>
        </div>

        <div class="kpi-card">
          <h3>Speed</h3>
          <div id="kpiSpeed">0</div>
        </div>

        <div class="kpi-card">
          <h3>Errors</h3>
          <div id="kpiErrors">0</div>
        </div>

        <div class="kpi-card">
          <h3>Efficiency Score</h3>
          <div id="kpiEfficiency">0</div>
        </div>

      </div>

      <!-- CHART SECTION (future hook) -->
      <div class="card">
        <h3>Efficiency Trend</h3>
        <canvas id="efficiencyChart"></canvas>
      </div>

    </section>

    <!-- =====================================================
         DAILY ENTRY
    ====================================================== -->
    <section id="entry" class="view">

      <h2>Daily Entry</h2>

      <form id="entryForm" class="form">

        <input type="date" id="date" required />
        <input type="text" id="employeeName" placeholder="Employee Name" required />

        <select id="department">
          <option value="">Department</option>
          <option>Receiving</option>
          <option>Putaway</option>
          <option>Picking</option>
          <option>Shipping</option>
          <option>Inventory</option>
          <option>Operations</option>
        </select>

        <input type="number" id="unitsProcessed" placeholder="Units" />
        <input type="number" id="hoursWorked" placeholder="Hours" />
        <input type="number" id="errors" placeholder="Errors" />

        <button type="submit">Save Entry</button>
      </form>

    </section>

    <!-- =====================================================
         RECORDS
    ====================================================== -->
    <section id="records" class="view">

      <h2>Records</h2>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Employee</th>
            <th>Dept</th>
            <th>Units</th>
            <th>Hours</th>
            <th>Errors</th>
          </tr>
        </thead>
        <tbody id="recordsTable"></tbody>
      </table>

    </section>

    <!-- =====================================================
         TARGETS
    ====================================================== -->
    <section id="targets" class="view">

      <h2>KPI Targets</h2>

      <input type="number" id="targetProductivity" placeholder="Productivity Target"/>
      <input type="number" id="targetAccuracy" placeholder="Accuracy Target"/>
      <input type="number" id="targetErrors" placeholder="Max Errors"/>

      <button id="saveTargetsBtn">Save Targets</button>

    </section>

  </main>
</div>

<script type="module" src="./src/app.js"></script>

</body>
</html>
