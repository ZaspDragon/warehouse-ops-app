<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse KPI Logger</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
  background: #f4f7fb;
}

/* LEFT MAIN NAV */
.main-sidebar {
  width: 220px;
  background: #0f2747;
  color: white;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.nav-btn {
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  background: #1c3a5f;
  font-weight: bold;
}

.nav-btn.active {
  background: #1f6fff;
}

/* DASHBOARD LAYOUT */
.dashboard-wrapper {
  display: none;
  flex: 1;
}

.dashboard-wrapper.active {
  display: flex;
}

/* DEPARTMENT SIDEBAR */
.dept-sidebar {
  width: 200px;
  background: #ffffff;
  border-right: 1px solid #ddd;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.dept-btn {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  background: #eef2f7;
  font-weight: bold;
}

.dept-btn.active {
  background: #1f6fff;
  color: white;
}

/* KPI AREA */
.kpi-panel {
  flex: 1;
  padding: 20px;
}

/* OTHER VIEWS */
.view {
  display: none;
  flex: 1;
  padding: 20px;
}

.view.active {
  display: block;
}
</style>
</head>

<body>

<!-- MAIN NAV -->
<div class="main-sidebar">
  <h2>Warehouse</h2>

  <div class="nav-btn active" data-view="dashboard">Dashboard</div>
  <div class="nav-btn" data-view="entry">Daily Entry</div>
  <div class="nav-btn" data-view="records">Records</div>
  <div class="nav-btn" data-view="targets">KPI Targets</div>
</div>

<!-- DASHBOARD (2 COLUMN LAYOUT) -->
<div id="dashboard" class="dashboard-wrapper active">

  <!-- DEPARTMENTS (LEFT INSIDE DASHBOARD) -->
  <div class="dept-sidebar">
    <h3>Departments</h3>

    <div class="dept-btn active" data-dept="receiving">Receiving</div>
    <div class="dept-btn" data-dept="putaway">Putaway</div>
    <div class="dept-btn" data-dept="picking">Picking</div>
    <div class="dept-btn" data-dept="shipping">Shipping</div>
    <div class="dept-btn" data-dept="inventory">Inventory</div>
    <div class="dept-btn" data-dept="operations">Operations</div>
  </div>

  <!-- KPI DISPLAY (RIGHT SIDE) -->
  <div class="kpi-panel">
    <h2 id="deptTitle">Receiving</h2>

    <div id="kpiContent">
      <p>Select a department to view KPIs.</p>
    </div>
  </div>
</div>

<!-- OTHER VIEWS -->
<div id="entry" class="view">
  <h2>Daily Entry</h2>
</div>

<div id="records" class="view">
  <h2>Records</h2>
</div>

<div id="targets" class="view">
  <h2>KPI Targets</h2>
</div>

<script>
/* MAIN NAV */
document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.querySelectorAll(".dashboard-wrapper").forEach(d => d.classList.remove("active"));

    btn.classList.add("active");

    const view = btn.dataset.view;
    document.getElementById(view).classList.add("active");
  });
});

/* DEPARTMENT SWITCHER */
const deptContent = {
  receiving: "Receiving KPIs: accuracy, dock-to-stock, receipts",
  putaway: "Putaway KPIs: speed, accuracy, cycle time",
  picking: "Picking KPIs: pick rate, accuracy, travel time",
  shipping: "Shipping KPIs: on-time %, damage-free rate",
  inventory: "Inventory KPIs: accuracy, shrinkage, space usage",
  operations: "Operations KPIs: downtime, incidents"
};

document.querySelectorAll(".dept-btn").forEach(btn => {
  btn.addEventListener("click", () => {

    document.querySelectorAll(".dept-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    const dept = btn.dataset.dept;

    document.getElementById("deptTitle").textContent =
      dept.charAt(0).toUpperCase() + dept.slice(1);

    document.getElementById("kpiContent").innerHTML =
      `<p>${deptContent[dept]}</p>`;
  });
});
</script>

<script src="app.js"></script>

</body>
</html>
