<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warehouse KPI Logger</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #f4f7fb;
    }

    .main-sidebar {
      width: 220px;
      background: #0f2747;
      color: white;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .nav-link {
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      background: #1c3a5f;
      font-weight: bold;
      user-select: none;
    }

    .nav-link.active {
      background: #1f6fff;
    }

    .dashboard-wrapper {
      display: none;
      flex: 1;
      min-width: 0;
    }

    .dashboard-wrapper.active {
      display: flex;
      flex: 1;
    }

    .dept-sidebar {
      width: 200px;
      background: #ffffff;
      border-right: 1px solid #ddd;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .dept-link {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      background: #eef2f7;
      font-weight: bold;
      user-select: none;
    }

    .dept-link.active {
      background: #1f6fff;
      color: white;
    }

    .kpi-panel {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }

    .view {
      display: none;
      flex: 1;
      padding: 20px;
      overflow: auto;
    }

    .view.active {
      display: block;
    }
  </style>
</head>

<body>
  <div class="main-sidebar">
    <h2>Warehouse</h2>

    <div class="nav-link active" data-view="dashboard">Dashboard</div>
    <div class="nav-link" data-view="entry">Daily Entry</div>
    <div class="nav-link" data-view="records">Records</div>
    <div class="nav-link" data-view="targets">KPI Targets</div>
  </div>

  <div id="dashboard" class="dashboard-wrapper active">
    <div class="dept-sidebar">
      <h3>Departments</h3>

      <div class="dept-link active" data-dept="receiving">Receiving</div>
      <div class="dept-link" data-dept="putaway">Putaway</div>
      <div class="dept-link" data-dept="picking">Picking</div>
      <div class="dept-link" data-dept="shipping">Shipping</div>
      <div class="dept-link" data-dept="inventory">Inventory</div>
      <div class="dept-link" data-dept="operations">Operations</div>
    </div>

    <div class="kpi-panel">
      <h2 id="deptTitle">Receiving</h2>
      <div id="kpiContent">
        <p>Select a department to view KPIs.</p>
      </div>
    </div>
  </div>

  <div id="entry" class="view">
    <h2>Daily Entry</h2>
    <!-- keep your existing entry form here -->
  </div>

  <div id="records" class="view">
    <h2>Records</h2>
    <!-- keep your existing records table container here -->
  </div>

  <div id="targets" class="view">
    <h2>KPI Targets</h2>
    <!-- keep your existing targets form here -->
  </div>

  <script src="app.js" defer></script>
</body>
</html>
</html>
