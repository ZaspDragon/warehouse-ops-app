<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warehouse Control Center</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
<div class="app-shell">

  <!-- MOBILE TOP BAR -->
  <div class="mobile-topbar">
    <button id="menuToggle">☰</button>
    <h2>WarehouseOS</h2>
  </div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <h2>WarehouseOS</h2>

    <nav class="nav-menu">
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="putaway">Putaway KPI</button>
      <button class="nav-btn" data-view="receiving">Receiving KPI</button>
      <button class="nav-btn" data-view="drivers">Lift Drivers</button>
      <button class="nav-btn" data-view="history">KPI History</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- DASHBOARD -->
    <section id="dashboardView" class="view active">
      <h1>Dashboard</h1>

      <div class="filters">
        <select id="rangeFilter">
          <option value="today">Today</option>
          <option value="week">This Week</option>
          <option value="month">This Month</option>
          <option value="all">All Time</option>
        </select>
      </div>

      <div class="card-grid">
        <div class="card clickable" data-view="putaway">
          <h3>Putaway</h3>
          <p id="putawayScore">0%</p>
        </div>

        <div class="card clickable" data-view="receiving">
          <h3>Receiving</h3>
          <p id="receivingScore">0%</p>
        </div>

        <div class="card clickable" data-view="drivers">
          <h3>Lift Drivers</h3>
          <p id="driverScore">0%</p>
        </div>
      </div>
    </section>

    <!-- PUTAWAY -->
    <section id="putawayView" class="view">
      <h2>Putaway KPI</h2>

      <input id="putawayName" placeholder="Employee Name"/>
      <input id="putawayLines" type="number" placeholder="Lines completed"/>

      <button onclick="savePutaway()">Save</button>

      <div id="putawayResults"></div>
    </section>

    <!-- RECEIVING -->
    <section id="receivingView" class="view">
      <h2>Receiving KPI</h2>

      <input id="truckName" placeholder="Employee Name"/>
      <select id="truckType">
        <option value="30">Transfer / LTL (30 min)</option>
        <option value="120">Container (120 min)</option>
      </select>

      <input id="truckTime" type="number" placeholder="Minutes taken"/>

      <button onclick="saveTruck()">Save</button>

      <div id="receivingResults"></div>
    </section>

    <!-- DRIVERS -->
    <section id="driversView" class="view">
      <h2>Lift Driver KPI</h2>

      <input id="driverName" placeholder="Driver Name"/>
      <input id="driverMoves" type="number" placeholder="Bin Moves"/>

      <button onclick="saveDriver()">Save</button>

      <div id="driverResults"></div>
    </section>

    <!-- HISTORY -->
    <section id="historyView" class="view">
      <h2>KPI History</h2>
      <div id="historyResults"></div>
    </section>

  </main>
</div>

<!-- MOBILE NAV -->
<div class="bottom-nav">
  <button data-view="dashboard">Home</button>
  <button data-view="putaway">Putaway</button>
  <button data-view="receiving">Receiving</button>
  <button data-view="drivers">Drivers</button>
</div>

<script src="app.js"></script>
</body>
</html>
