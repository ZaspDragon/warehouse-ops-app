<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse KPI Logger</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}

/* NAV */
.main-sidebar {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #0f2747;
  color: white;
  flex-wrap: wrap;
}

.nav-link {
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  background: #1c3a5f;
  font-weight: bold;
}

.nav-link.active {
  background: #1f6fff;
}

/* DASHBOARD */
.dashboard-wrapper {
  display: none;
  height: calc(100vh - 60px);
}

.dashboard-wrapper.active {
  display: flex;
}

.dept-sidebar {
  width: 200px;
  background: #fff;
  border-right: 1px solid #ddd;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.dept-link {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  background: #eef2f7;
  font-weight: bold;
}

.dept-link.active {
  background: #1f6fff;
  color: white;
}

.kpi-panel {
  flex: 1;
  padding: 20px;
  overflow: auto;
}

/* KPI GRID */
#kpiGrid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.kpi-card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* TABLE */
#recordsTable {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
  background: white;
}

#recordsTable th, #recordsTable td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 13px;
}

#recordsTable th {
  background: #f0f4ff;
}

/* OTHER VIEWS */
.view {
  display: none;
  padding: 20px;
}

.view.active {
  display: block;
}

#dashboardSummary {
  margin-top: 10px;
  background: white;
  padding: 10px;
  border-radius: 8px;
}

/* MOBILE */
@media (max-width: 768px) {
  .dashboard-wrapper {
    flex-direction: column;
  }

  .dept-sidebar {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
  }
}
</style>
</head>

<body>

<div class="main-sidebar">
  <div class="nav-link active" data-view="dashboard">Dashboard</div>
  <div class="nav-link" data-view="entry">Daily Entry</div>
  <div class="nav-link" data-view="records">Records</div>
  <div class="nav-link" data-view="targets">KPI Targets</div>
</div>

<div id="dashboard" class="dashboard-wrapper active">

  <div class="dept-sidebar">
    <div class="dept-link active" data-dept="receiving">Receiving</div>
    <div class="dept-link" data-dept="putaway">Putaway</div>
    <div class="dept-link" data-dept="picking">Picking</div>
    <div class="dept-link" data-dept="shipping">Shipping</div>
    <div class="dept-link" data-dept="inventory">Inventory</div>
    <div class="dept-link" data-dept="operations">Operations</div>
  </div>

  <div class="kpi-panel">
    <h2 id="deptTitle">Receiving</h2>

    <div id="kpiGrid"></div>
    <div id="dashboardSummary"></div>

    <table id="recordsTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Employee</th>
          <th>Dept</th>
          <th>Units</th>
          <th>Hours</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>
</div>

<div id="entry" class="view"><h2>Daily Entry</h2></div>
<div id="records" class="view"><h2>Records</h2></div>
<div id="targets" class="view"><h2>KPI Targets</h2></div>

<script type="module" src="./app.js"></script>

</body>
</html>
