<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Warehouse KPI System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f7fb;
}

/* NAV */
.nav {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #0f2747;
  color: white;
}

.nav button {
  padding: 10px;
  border: none;
  cursor: pointer;
  background: #1c3a5f;
  color: white;
  font-weight: bold;
  border-radius: 6px;
}

.nav button.active {
  background: #1f6fff;
}

/* LAYOUT */
.container {
  display: none;
  padding: 15px;
}

.container.active {
  display: block;
}

.dashboard {
  display: flex;
  gap: 10px;
}

/* DEPARTMENTS */
.depts {
  width: 200px;
  background: white;
  padding: 10px;
}

.depts button {
  display: block;
  width: 100%;
  margin-bottom: 5px;
  padding: 10px;
  border: none;
  background: #eef2f7;
  cursor: pointer;
  border-radius: 6px;
}

.depts button.active {
  background: #1f6fff;
  color: white;
}

/* KPI */
.kpis {
  flex: 1;
}

.card {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}

/* TABLE */
table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
}
</style>
</head>

<body>

<div class="nav">
  <button data-view="dashboard" class="active">Dashboard</button>
  <button data-view="entry">Entry</button>
  <button data-view="records">Records</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container active">
  <div class="dashboard">

    <div class="depts">
      <button class="dept active" data-dept="receiving">Receiving</button>
      <button class="dept" data-dept="picking">Picking</button>
      <button class="dept" data-dept="shipping">Shipping</button>
      <button class="dept" data-dept="inventory">Inventory</button>
      <button class="dept" data-dept="operations">Operations</button>
    </div>

    <div class="kpis">
      <h2 id="deptTitle">Receiving</h2>
      <div id="kpiBox"></div>
    </div>

  </div>
</div>

<!-- ENTRY -->
<div id="entry" class="container">
  <h2>Daily Entry</h2>

  <input id="date" type="date"/>
  <input id="employee" placeholder="Employee"/>
  <input id="department" placeholder="Department"/>
  <input id="units" type="number" placeholder="Units"/>
  <input id="hours" type="number" placeholder="Hours"/>

  <button id="saveBtn">Save</button>
</div>

<!-- RECORDS -->
<div id="records" class="container">
  <h2>Records</h2>
  <div id="tableBox"></div>
</div>

<script src="app.js"></script>

</body>
</html>
